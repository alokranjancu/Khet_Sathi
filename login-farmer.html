<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Farmer Login - Khet sathi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-success bg-opacity-10 d-flex align-items-center vh-100">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow-lg border-0 p-4">
                    <div class="text-center mb-4">
                        <h2 class="fw-bold text-success">🚜 Khet sathi</h2>
                        <p class="text-muted">Apne account mein login karein</p>
                    </div>
                    <form>
                        <div class="mb-3">
                            <label class="form-label">Phone Number</label>
                            <input type="tel" class="form-control" placeholder="+91 xxxxx xxxxx" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password / OTP</label>
                            <input type="password" class="form-control" placeholder="Enter Password" required>
                        </div>
                        <button type="submit" class="btn btn-success w-100 fw-bold">Login</button>
                    </form>
                    <div class="text-center mt-3">
                        <a href="login-admin.html" class="text-decoration-none text-muted small">Are you an Admin? Click here</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
