<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khet sathi - Book Farming Machinery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .hero-banner {
            /* Ek khet ki background image (Placeholder) */
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('https://png.pngtree.com/thumb_back/fh260/background/20250331/pngtree-the-tractor-is-spraying-square-gigantic-technology-in-green-field-which-image_17160330.jpg') no-repeat center center;
            background-size: cover;
            height: 80vh;
            display: flex;
            align-items: center;
            color: white;
        }
        .booking-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-success sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">🚜 Khet sathi</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link active" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="listings.html">Find Machinery</a></li>
                    <li class="nav-item"><a class="nav-link" href="upload.html">List Your Equipment</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact Us</a></li>
                    <li class="nav-item"><a class="nav-link" href="details.html">Equipment Details</a></li>
                    <li class="nav-item"><a class="btn btn-outline-light ms-2" href="login-farmer.html">Login</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <header class="hero-banner">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-10 col-lg-8 text-center mb-4">
                    <h1 class="display-4 fw-bold">Smart Farming, Smart Renting</h1>
                    <p class="lead">Apne aas-paas tractor, water pump aur kheti ki machinery rent par lein.</p>
                </div>
                
                <div class="col-md-12 col-lg-10">
                    <div class="booking-card">
                        <form action="listings.html" method="GET">
                            <div class="row g-3 align-items-center">
                                <div class="col-md-3">
                                    <label class="form-label text-dark fw-bold">📍 Location</label>
                                    <input type="text" class="form-control" placeholder="e.g., Chandigarh, Mohali" required>
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label text-dark fw-bold">🚜 Equipment</label>
                                    <select class="form-select">
                                        <option value="tractor">Tractor</option>
                                        <option value="pump">Water Pump</option>
                                        <option value="harvester">Harvester</option>
                                        <option value="rotavator">Rotavator</option>
                                    </select>
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label text-dark fw-bold">📅 Date</label>
                                    <input type="date" class="form-control" required>
                                </div>
                                <div class="col-md-3 mt-auto">
                                    <button type="submit" class="btn btn-success w-100 fw-bold py-2">Search 🔍</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>

            </div>
        </div>
    </header>

    <section class="container mt-5 pt-4">
        <h2 class="text-center fw-bold text-success mb-4">Popular Equipment</h2>
        <div class="row text-center g-4">
            <div class="col-md-4">
                <div class="card p-4 border-success shadow-sm">
                    <h3>🚜</h3>
                    <h5 class="mt-2">Tractors</h5>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-4 border-success shadow-sm">
                    <h3>💧</h3>
                    <h5 class="mt-2">Water Pumps</h5>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-4 border-success shadow-sm">
                    <h3>🌾</h3>
                    <h5 class="mt-2">Harvesters</h5>
                </div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    
</body>
</html>
