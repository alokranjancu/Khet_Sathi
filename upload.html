<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriRent - List Equipment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-success sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">🚜 Khet sathi</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="listings.html">Find Machinery</a></li>
                    <li class="nav-item"><a class="nav-link active" href="upload.html">List Your Equipment</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-lg border-0 p-4">
                    <h2 class="text-success fw-bold text-center mb-4">Apni Machinery Rent Par Dein</h2>
                    
                    <form id="uploadForm">
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Machinery Name</label>
                                <input type="text" class="form-control" placeholder="e.g. Swaraj 735 FE" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Category</label>
                                <select class="form-select">
                                    <option>Tractor</option>
                                    <option>Water Pump</option>
                                    <option>Harvester</option>
                                    <option>Cultivator</option>
                                </select>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Rent Price (₹ per hour)</label>
                                <input type="number" class="form-control" placeholder="e.g. 500" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Village / City Location</label>
                                <input type="text" class="form-control" placeholder="e.g. Kharar" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Upload Photo</label>
                            <input class="form-control" type="file" id="formFile" required>
                        </div>

                        <button type="submit" class="btn btn-success btn-lg w-100 mt-3 fw-bold">Submit Listing</button>
                    </form>

                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('uploadForm').addEventListener('submit', function(event) {
            event.preventDefault(); // Page ko reload hone se rokta hai
            alert("Badhai ho! Aapki machinery website par list ho gayi hai. Ab aas-paas ke kisan ise rent par le sakenge.");
            this.reset(); // Form ko clear kar deta hai
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
